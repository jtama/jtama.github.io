---
description: The list of talks I gave
layout: main
asciidoc-attributes:
    notitle: true
---
<section id="talks" class="bg-cream py-24 border-t border-gray-100">
    <div class="max-w-9/10 mx-auto px-8">
        <div class="grid md:grid-cols-2 gap-12">
        {#for talk in cdi:talks.list}
            <article class="group">
                <a href="{=talk.title.slugify.toLowerCase}">
                    <div class="mb-6 bg-stone-100 p-4 md:aspect-[4/5] flex items-center justify-center relative">
                        <img src='{=site.image("background.webp")}' alt="Décoration style art nouveau"
                             class="rounded-2xl absolute inset-0 w-full h-full object-cover opacity-70 mix-blend-multiply">
                        <div class="rounded-2xl relative z-10 bg-white/90 p-6 shadow-sm border border-stone-200 rounded-lg w-full">
                            {#if talk.image}
                            <img src='{=site.image(talk.image)}' class="w-full h-48 md:h-80 object-cover rounded-lg mb-6 md:my-12 shadow-lg"/>
                            {/if}
                            <h3 class="text-2xl mt-2 leading-snug mb-2">{=talk.title.asciidocify}</h3>
                        </div>
                    </div>
                </a>
            </article>
            {/for}
        </div>
    </div>
</section>
