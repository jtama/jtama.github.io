- title: "To Gather, or not to Gather, that is the question."
  description: |
    Depuis l'arrivée de l'api java.util.Stream en Java 8, on entend une complainte monter de la communauté :
    
     _Ô rage ! Ô désespoir ! Ô vieillesse ennemie ! Les opérations finales sont ouvertes, mais pas les opérations intermédaires... N'ai-je donc tant vécu que pour cette infamie ? 😱_

    Amis, réjouissez vous, car votre complainte a été entendue ! Nous voici donc tous réunis pour nous jeter corps et âmes dans cet ajout : les 🔥 java.util.stream.Gatherer 🔥.

    Comment fonctionnent-ils ? Est-il simple d'en implémenter ? Et d'ailleurs pourquoi je voudrais même le faire ?

    N'avez-vous jamais eu envie d'avoir un index dans vos streams, de les zipper ou de les fusionner ? C'est ce que je vous propose de mettre en oeuvre avec quelques Gatherers, du plus simple au plus complexe (tout est relatif).

    Et cadeau bonux, vous repartirez avec le dépôt git contenant les sources explorées !
  slides: https://jtama.github.io/to-gather-or-not-to-gather/#/
  code: https://github.com/jtama/to-gather-or-not-to-gather
  post: ../posts/to-gather-or-not-to-gather-that-is-the-question/
  conferences:
    - name: Touraine Tech 2025
      video: https://youtu.be/FsL8BPgKKPM?si=Bq53NbCjSpRlXSHn
- title: "Quarkus : Greener, Better, Faster, stronger!"
  description: |
    Quarkus n'est maintenant plus un nouveau venu dans l'écosystème java, et de plus en plus de projets l'adoptent comme base de travail,  mais peu de développeurs comprennent vraiment à quel point la magie se cache dans ses extensions.

    C'est en développant l'extension https://github.com/quarkiverse/quarkus-minio[Quarkus Minio] que j'ai  découvert une partie de leurs capacités,  et comment elles sont en fait au coeur des promesses du framework. Leur développement est simple et permet de rendre un grand nombre de services à nos utilisateurs. Mais surtout elles permettent de ne rendre que les services dont l'utilisateur à besoin nous permettant d'économiser mémoire, cpu et de raccourcir les temps de démarrage.
  
    Et si vous veniez en développer une avec moi et que nous mettions en oeuvre quelques uns de ces tours de magie ?
  
    Vous pourriez peut être aussi aimer ça et repartir avec quelques idées !
  slides: https://jtama.github.io/quarkus-greener-better-faster-stronger/rivieraDev/#/
