- title: Alice au pays d'Opentelemetry
  description: |
        S'ennuyant fermement alors que sa grande soeur lisait un livre sans image ni dialogue, Alice aperçut soudain passer auprès d'elle Opentelemetry criant qu'il allait unir traces, metrics et logs.
        En entrant derrière lui dans son terrier, elle fit une chute presque interminable qui l'emmèna dans un monde aux antipodes du sien. Elle y rencontra une galerie de personnages retors et se trouva confrontée au paradoxe, à l'absurde et au bizarre…

        C'est une image très conforme à l'impression que j'ai eu en voulant mettre en place Opentelemetry sur un projet. J'étais revenu très enthousiaste d'une conférence qui me laissait présager que tout était merveilleux, mais ce ne fût pas si simple.

        Je vous propose donc de suivre le cas réel de la mise en place d'Opentelemtry sur une application en service développée avec Quarkus et déployée dans un cluster K8S.
  slides: https://jtama.github.io/alice-au-pays-d-opentelemetry/#/
