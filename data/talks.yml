- title: Vous allez finir par les aimer les `Optionals`???
  description: |
        Les `optional` ont débarqué en java 1.8 il y a 8 ans. Quand ils sont apparus je me souviens m'être dit :
        
        "Génial ! Avant on faisait _if (object != null)_, maintenant on fait _if (optional.isPresent())_ Quelle avancée 🙄 !"

        Depuis j'ai eu l'occasion de les cotoyer, d'apprendre à les aimer et à les utiliser à bon escient.

        Sur les projets auxquels je participe je m'aperçois qu'ils sont encore souvent mal utilisés, ou pas utiliseés quand il le faudrait.

        Ensemble redécouvrons leur élégance, apprenons à maîtriser leur API et pourquoi ils sont bien mieux qu'un simple *null check* !
  slides: https://jtama.github.io/vous-allez-finir-par-les-aimer-les-optional/#/
  post: https://dev.to/onepoint/vous-allez-finir-par-les-aimer-les-optionals--25pb
  conferences:
    - name: Touraine Tech 2023
      video: https://youtu.be/0LVkoF5D1eE?si=9qXUQwH5mG6UQyHN
