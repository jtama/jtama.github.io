- title: Fatigués de la POO ? Passez à la DOP !
  description: |
    Depuis Java 8 et l'introduction de d'une dose de programmation _fonctionnelle_, le langage a beaucoup évoluer.

    Chaque _release_ ou presque apporte son lot de nouveautés qui nous permettent de repenser nos applications, qui nous donnent de nouveaux outils.

    La **P**rogrammation **O**rientée **D**onnées (_Data Oriented Programming_) représente un paradigme émergent qui privilégie la manipulation des données plutôt que l’encapsulation des comportements. 

    *Ce guide pratique* -sous forme de refactoring- explore les étapes clés pour transformer du code Java, d'une approche traditionnelle, orientés objet vers une approche orientée données.

    🏹 Armez vos arcs de nouvelles cordes et repartez avec un kata à faire en équipe.
  code: https://github.com/jtama/crazy-data-oriented-programming
  post: http://localhost:8081/posts/de-la-programmation-orient-e-objet-vers-la-programmation-orient-e-donn-es-un-guide-pratique/
  conferences:
    - name: Touraine Tech 2026
- title: "OpenRewrite: Refactoring as code"
  description: |
    Vous êtes dans la team __Doc as code, Infrastructure as code, Ci as code__ ? La réponse à ces questions vous semble évidente.
  
    Les bienfaits de l'approche _"as code"_ ne sont plus à démontrer et pourtant il reste un domaine laissé pour compte.

    Oui parce que si je vous pose ces questions pour vos refactorings et vos migrations, ça sera plutôt :
  
    Vous êtes plutôt team __chercher/remplacer__ ? __regexp__ ? __IDE click droit *rename method*__ ?
  
    Eh oui, les cordonniers sont toujours les plus mal chaussés, et nous continuons a écrire des guides de migrations longs comme un dimanche de pluie. Fatigué de mener des migrations JUnit4 -> JUnit 5? Spring-boot 2 -> Spring-boot 3?
    
    Est-ce qu’il ne serait pas temps d’entrer dans la team ___refactoring as code___?
    
    OpenRewrite est la boîte à outils parfaite pour écrire, versionner et partager vos refactoring. L'Ansible du refactoring.
    
    Ne repartez pas sans une nouvelle as corde à votre arc, ne faite plus jamais vos migrations à la main.
  slides: https://jtama.github.io/openrewrite-refactoring-as-code/main/#
  code: https://github.com/jtama/openrewrite-refactoring-as-code
  post: https://dev.to/onepoint/openrewrite-refactoring-as-code-2p48
